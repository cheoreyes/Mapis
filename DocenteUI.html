<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f8fafc; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Estilo select personalizado */
        .custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden bg-slate-50">

    <!-- HEADER -->
    <header class="bg-slate-900 text-white p-4 shadow-lg z-20 flex-shrink-0">
        <div class="flex justify-between items-center max-w-md mx-auto w-full">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center font-bold text-sm">M</div>
                <h1 class="font-bold text-lg tracking-tight">MAPIS DOCENTE</h1>
            </div>
            <span class="text-[10px] font-bold bg-blue-600/30 text-blue-200 px-2 py-1 rounded-full border border-blue-500/30">v2.5 TOAST</span>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto relative w-full max-w-md mx-auto bg-white shadow-xl min-h-0">
        
        <!-- VISTA LOGIN -->
        <div id="view-login" class="flex flex-col items-center justify-center h-full p-6 space-y-6 fade-in">
            <div class="text-center mb-4">
                <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full mx-auto flex items-center justify-center text-4xl mb-4">
                    <i class="ph-fill ph-lock-key"></i>
                </div>
                <h2 class="text-2xl font-bold text-slate-800">Acceso Docente</h2>
                <p class="text-sm text-slate-500">Ingresa tu PIN de seguridad</p>
            </div>
            <div class="w-full max-w-xs space-y-4">
                <input type="number" id="pin-input" maxlength="4" inputmode="numeric" pattern="[0-9]*"
                    class="block w-full text-center text-3xl tracking-[0.5em] py-4 border border-slate-300 rounded-2xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition shadow-sm" 
                    placeholder="••••">
                <button onclick="loginDocente()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg transition active:scale-95">
                    Ingresar
                </button>
            </div>
        </div>

        <!-- VISTA DASHBOARD -->
        <div id="view-dashboard" class="hidden flex-col h-full p-6 pb-24 overflow-y-auto fade-in">
            
            <!-- Info Docente -->
            <div class="flex justify-between items-center mb-6 bg-blue-50 p-3 rounded-xl border border-blue-100">
                <div class="flex items-center gap-2">
                    <i class="ph-fill ph-chalkboard-teacher text-blue-600 text-xl"></i>
                    <span id="docente-nombre" class="font-bold text-blue-900 text-sm">Profesor...</span>
                </div>
                <button onclick="logoutDocente()" class="text-xs text-red-600 font-bold hover:bg-red-50 px-2 py-1 rounded-lg">Salir</button>
            </div>

            <!-- BUSCADOR POR NOMBRE -->
            <div class="space-y-3 mb-2">
                <label class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1">Identificar Alumno</label>
                <div class="relative">
                    <select id="student-select" onchange="seleccionarAlumno(this.value)" 
                        class="custom-select block w-full px-4 py-3 pr-8 border border-slate-300 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm font-bold text-slate-700 transition appearance-none cursor-pointer">
                        <option value="" disabled selected>-- Selecciona o escribe nombre --</option>
                    </select>
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="ph ph-magnifying-glass text-slate-400 text-lg"></i>
                    </div>
                </div>
            </div>

            <!-- TARJETA ALUMNO (Bajada con mt-6 para no tapar foto) -->
            <div id="student-card" class="hidden bg-white rounded-3xl shadow-lg border border-slate-100 text-center relative overflow-hidden mb-4 mt-6 transition-all transform scale-100">
                <div class="h-20 bg-gradient-to-br from-blue-500 to-indigo-600 absolute top-0 w-full"></div>
                
                <div class="relative pt-6 pb-4 px-6 z-10">
                    <div class="relative w-24 h-24 mx-auto mb-3">
                        <img id="stu-photo" src="" alt="Foto" class="w-full h-full rounded-full object-cover border-4 border-white shadow-lg bg-gray-100">
                        <div class="absolute bottom-0 right-0 bg-green-500 w-6 h-6 rounded-full border-2 border-white flex items-center justify-center shadow-sm">
                            <i class="ph-bold ph-check text-white text-xs"></i>
                        </div>
                    </div>
                    
                    <h2 id="stu-name" class="text-xl font-black text-slate-800 leading-tight mb-1">--</h2>
                    <p id="stu-grade" class="text-slate-500 text-xs font-medium uppercase tracking-wide mb-3">--</p>
                    
                    <div class="inline-flex flex-col items-center bg-slate-50 px-4 py-1.5 rounded-xl border border-slate-100 shadow-inner">
                        <span class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">Saldo</span>
                        <span id="stu-balance" class="text-2xl font-black text-emerald-600">--</span>
                    </div>
                </div>
            </div>

            <!-- Grid Acciones -->
            <div id="actions-grid" class="opacity-50 pointer-events-none transition-opacity duration-300 space-y-4 mt-4">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider ml-1 mb-2">Registrar Conducta Rápida</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="sendTransaction(50, 'Entrega Anticipada', 'Académico')" class="group bg-emerald-50 border border-emerald-200 text-emerald-700 p-4 rounded-2xl font-bold transition-all flex flex-col items-center gap-2 shadow-sm active:scale-95">
                        <i class="ph-fill ph-check-circle text-3xl"></i> <span>+50 pts</span> <span class="text-[10px] font-normal opacity-70">Entrega Ant.</span>
                    </button>
                    <button onclick="sendTransaction(30, 'Participación Activa', 'Académico')" class="group bg-teal-50 border border-teal-200 text-teal-700 p-4 rounded-2xl font-bold transition-all flex flex-col items-center gap-2 shadow-sm active:scale-95">
                        <i class="ph-fill ph-hand-raised text-3xl"></i> <span>+30 pts</span> <span class="text-[10px] font-normal opacity-70">Participación</span>
                    </button>
                    <button onclick="sendTransaction(-20, 'Interrupción Clase', 'Hábitos')" class="group bg-red-50 border border-red-200 text-red-700 p-4 rounded-2xl font-bold transition-all flex flex-col items-center gap-2 shadow-sm active:scale-95">
                        <i class="ph-fill ph-warning-circle text-3xl"></i> <span>-20 pts</span> <span class="text-[10px] font-normal opacity-70">Interrupción</span>
                    </button>
                    <button onclick="sendTransaction(-30, 'Celular sin Permiso', 'Hábitos')" class="group bg-rose-50 border border-rose-200 text-rose-700 p-4 rounded-2xl font-bold transition-all flex flex-col items-center gap-2 shadow-sm active:scale-95">
                        <i class="ph-fill ph-device-mobile-slash text-3xl"></i> <span>-30 pts</span> <span class="text-[10px] font-normal opacity-70">Celular</span>
                    </button>
                </div>
                <button onclick="resetStudentCard()" class="w-full mt-4 py-3 text-slate-500 font-semibold hover:text-slate-800 hover:bg-slate-100 rounded-xl transition flex items-center justify-center gap-2">
                    <i class="ph-bold ph-arrows-counter-clockwise"></i> Buscar otro alumno
                </button>
            </div>
        </div>

        <!-- OVERLAY CARGA -->
        <div id="overlay-status" class="hidden fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center backdrop-blur-sm">
            <div class="bg-white p-6 rounded-2xl shadow-xl text-center max-w-xs mx-4">
                <div id="status-icon" class="text-4xl mb-2 animate-pulse">⏳</div>
                <h3 id="status-title" class="font-bold text-lg text-slate-800">Cargando...</h3>
            </div>
        </div>

        <!-- NOTIFICACIÓN TOAST (Reemplazo de Alert) -->
        <div id="toast-notification" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 z-[60] transition-all duration-300 opacity-0 translate-y-10 pointer-events-none max-w-[90%]">
            <div id="toast-icon" class="text-xl"></div>
            <span id="toast-message" class="font-medium text-sm">Mensaje aquí</span>
        </div>

    </main>

    <script>
        let sessionDocente = { id: null, nombre: null };
        let currentStudentData = null; 

        window.onload = function() {
            document.getElementById('pin-input').focus();
        };

        // --- SISTEMA DE NOTIFICACIONES TOAST ---
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast-notification');
            const iconEl = document.getElementById('toast-icon');
            const msgEl = document.getElementById('toast-message');
            
            msgEl.innerText = message;
            
            if (type === 'success') {
                iconEl.innerHTML = '<i class="ph-fill ph-check-circle text-emerald-400"></i>';
                toast.className = "fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 z-[60] transition-all duration-300 max-w-[90%]";
            } else {
                iconEl.innerHTML = '<i class="ph-fill ph-warning-circle text-red-400"></i>';
                toast.className = "fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 z-[60] transition-all duration-300 max-w-[90%]";
            }

            // Mostrar
            toast.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
            
            // Ocultar solo 3 seg
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
            }, 3000);
        }

        function loginDocente() {
            const pin = document.getElementById('pin-input').value.trim();
            if (!pin) return showToast("Ingresa tu PIN", 'error');
            
            showStatus(true, 'Verificando...');
            google.script.run.withSuccessHandler(function(res) {
                showStatus(false);
                if (res.success) {
                    sessionDocente = { id: res.idDocente, nombre: res.nombreDocente };
                    document.getElementById('docente-nombre').innerText = res.nombreDocente;
                    document.getElementById('view-login').classList.add('hidden');
                    document.getElementById('view-dashboard').classList.remove('hidden');
                    document.getElementById('view-dashboard').classList.add('flex');
                    cargarListaAlumnos();
                } else {
                    showToast(res.error, 'error');
                    document.getElementById('pin-input').value = '';
                }
            }).validarPinDocente(pin);
        }

        function logoutDocente() {
            location.reload();
        }

        function cargarListaAlumnos() {
            showStatus(true, 'Cargando alumnos...');
            google.script.run.withSuccessHandler(function(lista) {
                showStatus(false);
                const select = document.getElementById('student-select');
                select.innerHTML = '<option value="" disabled selected>-- Selecciona o escribe nombre --</option>';
                
                lista.sort((a, b) => a.nombre.localeCompare(b.nombre));

                lista.forEach(alumno => {
                    const option = document.createElement('option');
                    option.value = alumno.hash; 
                    option.text = alumno.nombre; 
                    select.appendChild(option);
                });
            }).obtenerListaAlumnos();
        }

        function seleccionarAlumno(hash) {
            if (!hash) return;
            showStatus(true, 'Buscando...');
            
            google.script.run.withSuccessHandler(function(res) {
                showStatus(false);
                if (res.success) {
                    currentStudentData = res; 
                    renderStudentCard(res);
                    enableActions(true);
                } else {
                    showToast("Error al cargar datos", 'error');
                }
            }).buscarEstudiantePorHash(hash);
        }

        function renderStudentCard(data) {
            const card = document.getElementById('student-card');
            card.classList.remove('hidden');
            
            document.getElementById('stu-name').innerText = data.nombre;
            document.getElementById('stu-grade').innerText = data.grado;
            document.getElementById('stu-balance').innerText = data.saldo;
            
            const img = document.getElementById('stu-photo');
            img.src = data.foto + '?t=' + new Date().getTime();
            
            card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function resetStudentCard() {
            document.getElementById('student-card').classList.add('hidden');
            document.getElementById('student-select').value = ""; 
            enableActions(false);
            document.getElementById('view-dashboard').scrollTop = 0;
        }

        function enableActions(enable) {
            const grid = document.getElementById('actions-grid');
            if (enable) grid.classList.remove('opacity-50', 'pointer-events-none');
            else grid.classList.add('opacity-50', 'pointer-events-none');
        }

        function sendTransaction(puntos, tipo, categoria) {
            if (!currentStudentData || !sessionDocente.id) return showToast("Selecciona un alumno primero", 'error');
            
            showStatus(true, 'Guardando...');
            const data = { 
                hashQR: currentStudentData.hash, 
                puntos: puntos, 
                tipoConducta: tipo, 
                categoria: categoria, 
                nota: "", 
                idDocente: sessionDocente.id 
            };

            google.script.run.withSuccessHandler(function(response) {
                showStatus(false);
                if (response && response.success) {
                    document.getElementById('stu-balance').innerText = response.nuevoSaldo;
                    currentStudentData.saldo = response.nuevoSaldo;
                    
                    // USAR TOAST EN LUGAR DE ALERT
                    showToast(`Éxito: ${puntos > 0 ? '+' : ''}${puntos} pts a ${currentStudentData.nombre}`, 'success');
                    
                    resetStudentCard();
                } else {
                    showToast("Error: " + (response ? response.error : 'Desconocido'), 'error');
                }
            }).registrarTransaccion(data);
        }

        function showStatus(show, msg) {
            const overlay = document.getElementById('overlay-status');
            if (show) {
                document.getElementById('status-title').innerText = msg || 'Cargando...';
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
